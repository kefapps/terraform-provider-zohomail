# Terraform Provider release workflow.
name: Release

# This GitHub action creates a release when a tag that matches the pattern
# "v*" (e.g. v0.1.0) is created.
on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false
      - run: go mod download
      - run: make test
      - run: make build
      - run: make generate
      - name: Check generated files are committed
        run: |
          if [ -n "$(git status --short --untracked-files=all)" ]; then
            git status --short --untracked-files=all
            echo
            echo "Unexpected diff after make generate. Run 'make generate' and commit the result."
            exit 1
          fi
      - run: go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs validate --provider-name zohomail

  goreleaser:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install 1Password CLI
        run: |
          curl -sSLo /tmp/1password-cli.deb \
            https://downloads.1password.com/linux/debian/amd64/stable/1password-cli-latest.deb
          sudo dpkg -i /tmp/1password-cli.deb
          op --version
      - name: Load release signing secrets from 1Password
        id: load_release_secrets
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_GPG_PRIVATE_KEY_REF: ${{ vars.OP_GPG_PRIVATE_KEY_REF }}
          OP_GPG_PASSPHRASE_REF: ${{ vars.OP_GPG_PASSPHRASE_REF }}
        run: |
          unset OP_CONNECT_HOST OP_CONNECT_TOKEN
          test -n "$OP_SERVICE_ACCOUNT_TOKEN"
          test -n "$OP_GPG_PRIVATE_KEY_REF"
          test -n "$OP_GPG_PASSPHRASE_REF"
          {
            echo "gpg_private_key<<__OP_EOF__"
            op read "$OP_GPG_PRIVATE_KEY_REF"
            echo "__OP_EOF__"
          } >> "$GITHUB_OUTPUT"
          printf 'gpg_passphrase=%s\n' "$(op read "$OP_GPG_PASSPHRASE_REF")" >> "$GITHUB_OUTPUT"
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ steps.load_release_secrets.outputs.gpg_private_key }}
          passphrase: ${{ steps.load_release_secrets.outputs.gpg_passphrase }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
